services:

  mysql:
    image: mysql:8.0

    container_name: devmart-mysql

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: devmart_auth

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql

  auth-service:
    build:
      context: ./backend/auth-service

    container_name: auth-service

    restart: always

    depends_on:
      - mysql

    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: devmart_auth
      MYSQL_USER: root
      MYSQL_PASSWORD: root123

      SECRET_KEY: my-super-secret-key-for-devmart
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60

    ports:
      - "8000:8000"

volumes:
  mysql_data: